<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FurryOS - 网页版操作系统</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: linear-gradient(135deg, #f5af19 0%, #f12711 100%);
            height: 100vh;
        }

        /* 欢迎页面 */
        .welcome-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #f5af19 0%, #f12711 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            animation: fadeIn 0.5s ease;
        }

        .welcome-box {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 24px;
            padding: 45px 40px;
            width: 90%;
            max-width: 480px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .welcome-title {
            font-size: 52px;
            font-weight: 800;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #f5af19 0%, #f12711 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }

        .welcome-subtitle {
            font-size: 14px;
            color: #888;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .auth-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            background: #f0f0f0;
            border-radius: 50px;
            padding: 4px;
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 16px;
            font-weight: 600;
            color: #666;
            transition: all 0.3s;
            border-radius: 50px;
        }

        .auth-tab.active {
            background: linear-gradient(135deg, #f5af19 0%, #f12711 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(241, 39, 17, 0.3);
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .auth-input {
            width: 100%;
            padding: 14px 16px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
            background: white;
        }

        .auth-input:focus {
            border-color: #f5af19;
            box-shadow: 0 0 0 3px rgba(245, 175, 25, 0.1);
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            background: linear-gradient(135deg, #f5af19 0%, #f12711 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(241, 39, 17, 0.4);
        }

        .error-msg {
            color: #f12711;
            font-size: 13px;
            margin-top: 10px;
            text-align: center;
        }

        /* 桌面系统 */
        .desktop {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #f5af19 0%, #f12711 100%);
            overflow: hidden;
        }

        .desktop-icons {
            position: relative;
            width: 100%;
            height: calc(100% - 50px);
            padding: 20px;
        }

        .desktop-icon {
            position: absolute;
            width: 80px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.1s;
            z-index: 10;
        }

        .desktop-icon.dragging {
            opacity: 0.8;
            z-index: 1000;
        }

        .desktop-icon:hover {
            transform: scale(1.05);
        }

        .icon-image {
            font-size: 48px;
            display: block;
        }

        .icon-name {
            color: white;
            font-size: 12px;
            margin-top: 5px;
            word-break: break-word;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.5);
            background: rgba(0,0,0,0.5);
            padding: 2px 4px;
            border-radius: 4px;
            display: inline-block;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* 任务栏 */
        .taskbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            padding: 0 20px;
            z-index: 1000;
        }

        .start-menu {
            background: linear-gradient(135deg, #f5af19 0%, #f12711 100%);
            color: white;
            padding: 8px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            margin-right: 20px;
            transition: transform 0.2s;
        }

        .start-menu:hover {
            transform: scale(1.02);
        }

        .taskbar-windows {
            flex: 1;
            display: flex;
            gap: 10px;
            overflow-x: auto;
        }

        .taskbar-window-btn {
            background: rgba(255,255,255,0.2);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            white-space: nowrap;
            transition: background 0.2s;
        }

        .taskbar-window-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .taskbar-window-btn.active {
            background: linear-gradient(135deg, #f5af19 0%, #f12711 100%);
        }

        .datetime {
            color: white;
            text-align: right;
            font-size: 12px;
            margin-left: 20px;
        }

        .datetime div:first-child {
            font-size: 14px;
            font-weight: bold;
        }

        /* 窗口 */
        .window {
            position: fixed;
            background: rgba(30, 30, 30, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            min-width: 200px;
            min-height: 150px;
        }

        .window.maximized {
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: calc(100vh - 50px) !important;
            border-radius: 0;
        }

        .window-header {
            padding: 12px;
            background: rgba(0,0,0,0.5);
            border-radius: 12px 12px 0 0;
            cursor: move;
            display: flex;
            justify-content: space-between;
            user-select: none;
        }

        .window.maximized .window-header {
            border-radius: 0;
        }

        .window-title {
            color: white;
            font-weight: bold;
        }

        .window-controls {
            display: flex;
            gap: 10px;
        }

        .window-control {
            cursor: pointer;
            color: white;
            width: 24px;
            text-align: center;
            transition: background 0.2s;
            border-radius: 4px;
        }

        .window-control:hover {
            background: rgba(255,255,255,0.2);
        }

        .window-content {
            flex: 1;
            padding: 20px;
            color: white;
            overflow: auto;
            min-height: 100px;
        }

        /* 窗口缩放控制条 */
        .resize-handle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: transparent;
            z-index: 20;
        }

        .resize-handle.nw { top: 0; left: 0; cursor: nw-resize; }
        .resize-handle.n { top: 0; left: 10px; right: 10px; width: auto; height: 5px; cursor: n-resize; }
        .resize-handle.ne { top: 0; right: 0; cursor: ne-resize; }
        .resize-handle.w { top: 10px; left: 0; bottom: 10px; width: 5px; height: auto; cursor: w-resize; }
        .resize-handle.e { top: 10px; right: 0; bottom: 10px; width: 5px; height: auto; cursor: e-resize; }
        .resize-handle.sw { bottom: 0; left: 0; cursor: sw-resize; }
        .resize-handle.s { bottom: 0; left: 10px; right: 10px; width: auto; height: 5px; cursor: s-resize; }
        .resize-handle.se { bottom: 0; right: 0; cursor: se-resize; }

        /* 浏览器样式 */
        .browser-toolbar {
            padding: 8px;
            background: rgba(0,0,0,0.2);
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .browser-url {
            flex: 1;
            padding: 8px 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            color: white;
            outline: none;
            min-width: 200px;
        }

        .browser-go, .browser-back, .browser-forward, .browser-refresh {
            padding: 6px 12px;
            background: #f5af19;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
        }

        .browser-back, .browser-forward, .browser-refresh {
            background: rgba(255,255,255,0.1);
        }

        .browser-tab-bar {
            display: flex;
            background: rgba(0,0,0,0.3);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 4px 8px 0 8px;
            gap: 2px;
            overflow-x: auto;
        }

        .browser-tabs {
            display: flex;
            flex: 1;
            gap: 2px;
            min-width: 0;
        }

        .browser-tab {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            min-width: 120px;
            max-width: 200px;
            transition: background 0.2s;
        }

        .browser-tab:hover {
            background: rgba(255,255,255,0.1) !important;
        }

        .browser-tab.active {
            background: rgba(255,255,255,0.2) !important;
        }

        .new-tab-btn:hover {
            background: rgba(255,255,255,0.2) !important;
        }

        .browser-tabs::-webkit-scrollbar {
            height: 4px;
        }

        .browser-tabs::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
        }

        .browser-tabs::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
        }

        /* AI 悬浮窗样式 - 右上角位置 */
        .ai-floating-btn {
            position: fixed;
            top: 80px;
            right: 20px;
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #f5af19 0%, #f12711 100%);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: bold;
            font-size: 18px;
            color: white;
        }

        .ai-floating-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }

        .ai-chat-window {
            position: fixed;
            top: 80px;
            right: 80px;
            width: 350px;
            height: 450px;
            background: rgba(30, 30, 30, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 1001;
            animation: fadeIn 0.3s ease;
        }

        .ai-chat-window.minimized {
            height: 50px;
        }

        .ai-chat-header {
            padding: 12px 15px;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
            user-select: none;
        }

        .ai-chat-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            color: white;
        }

        .ai-chat-controls {
            display: flex;
            gap: 12px;
        }

        .ai-chat-control {
            cursor: pointer;
            color: white;
            font-size: 14px;
            width: 20px;
            text-align: center;
        }

        .ai-chat-control:hover {
            opacity: 0.8;
        }

        .ai-chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .ai-message {
            display: flex;
            gap: 10px;
            animation: fadeIn 0.3s ease;
        }

        .ai-message.user {
            flex-direction: row-reverse;
        }

        .ai-message.user .message-bubble {
            background: #667eea;
            border-radius: 12px 12px 4px 12px;
        }

        .ai-message.assistant .message-bubble {
            background: rgba(255,255,255,0.1);
            border-radius: 12px 12px 12px 4px;
        }

        .ai-avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #f5af19 0%, #f12711 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .user-avatar {
            background: #667eea;
        }

        .message-bubble {
            max-width: 70%;
            padding: 10px 12px;
            color: white;
            font-size: 13px;
            line-height: 1.5;
        }

        .ai-chat-input-area {
            padding: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            gap: 8px;
        }

        .ai-chat-input {
            flex: 1;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            color: white;
            outline: none;
            font-size: 13px;
        }

        .ai-chat-send {
            padding: 8px 16px;
            background: #f5af19;
            border: none;
            border-radius: 20px;
            color: white;
            cursor: pointer;
        }

        .ai-chat-send:hover {
            opacity: 0.9;
        }

        .ai-rate-limit-info {
            font-size: 10px;
            color: rgba(255,255,255,0.4);
            text-align: center;
            padding: 5px;
        }

        /* 游戏菜单样式 */
        .game-menu-item {
            display: flex;
            align-items: center;
            padding: 15px;
            margin: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .game-menu-item:hover {
            background: rgba(255,255,255,0.2);
        }

        .game-icon {
            font-size: 32px;
            margin-right: 15px;
        }

        .game-info {
            flex: 1;
        }

        .game-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .game-desc {
            font-size: 12px;
            color: rgba(255,255,255,0.7);
        }

        /* 文件夹内容 */
        .folder-content {
            display: grid;
            grid-template-columns: repeat(auto-fill, 80px);
            gap: 20px;
            padding: 20px;
        }

        .empty-folder {
            text-align: center;
            padding: 40px;
            color: #aaa;
            font-size: 18px;
        }

        /* 记事本 */
        .notepad-textarea {
            width: 100%;
            height: 300px;
            background: rgba(0,0,0,0.5);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            padding: 10px;
            font-size: 14px;
            font-family: monospace;
            resize: none;
        }

        /* 右键菜单 */
        .context-menu {
            position: fixed;
            background: rgba(32, 32, 32, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 8px 0;
            min-width: 200px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            z-index: 10000;
            animation: menuFadeIn 0.1s ease;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 8px 16px;
            cursor: pointer;
            transition: background 0.1s;
            position: relative;
            color: white;
        }

        .menu-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .menu-item.danger:hover {
            background: rgba(220, 53, 69, 0.8);
        }

        .menu-icon {
            width: 24px;
            margin-right: 8px;
            font-size: 16px;
        }

        .menu-label {
            flex: 1;
            font-size: 14px;
        }

        .submenu-arrow {
            margin-left: auto;
            font-size: 10px;
        }

        .context-submenu {
            position: absolute;
            left: 100%;
            top: 0;
            background: rgba(32, 32, 32, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 8px 0;
            min-width: 150px;
            z-index: 10001;
            animation: menuFadeIn 0.1s ease;
        }

        .context-submenu .menu-item {
            padding: 8px 16px;
        }

        .has-submenu {
            position: relative;
        }

        @keyframes menuFadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes floatPulse {
            0%, 100% { box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
            50% { box-shadow: 0 4px 25px rgba(245,175,25,0.5); }
        }

        @keyframes dotPulse {
            0%, 20% { opacity: 0; }
            50% { opacity: 1; }
            80%, 100% { opacity: 0; }
        }

        .dot-animation {
            animation: dotPulse 1.5s infinite;
        }

        .toast {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            z-index: 10001;
            animation: fadeIn 0.3s;
        }
        
        .start-menu-popup {
            position: fixed;
            bottom: 60px;
            left: 20px;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            padding: 15px;
            min-width: 250px;
            z-index: 1000;
            color: white;
        }
        
        .start-menu-popup > div {
            padding: 8px;
            cursor: pointer;
        }
        
        .start-menu-popup > div:hover {
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
        }
        
        .start-menu-popup hr {
            margin: 8px 0;
            border-color: rgba(255,255,255,0.2);
        }
        
        .change-password-form {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        
        .change-password-form input {
            width: 100%;
            padding: 6px;
            margin: 5px 0;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 4px;
            color: white;
        }
        
        .change-password-form button {
            width: 100%;
            padding: 6px;
            margin-top: 5px;
            background: #f5af19;
            border: none;
            border-radius: 4px;
            color: white;
            cursor: pointer;
        }
        
        .game-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .share-tab {
            transition: all 0.2s;
        }

        .share-tab.active {
            border-bottom: 2px solid #f5af19 !important;
            color: #f5af19;
        }

        .share-tab:hover {
            background: rgba(255,255,255,0.1);
        }

        .share-panel {
            animation: fadeIn 0.2s ease;
        }
        
        .forum-tab {
            transition: all 0.2s;
        }

        .forum-tab.active {
            border-bottom: 2px solid #f5af19 !important;
            color: #f5af19;
        }

        .forum-tab:hover {
            background: rgba(255,255,255,0.1);
        }

        .forum-post-item:hover {
            background: rgba(255,255,255,0.1) !important;
        }

        .forum-panel {
            animation: fadeIn 0.2s ease;
        }
        
        .dir-tree {
            font-family: monospace;
            font-size: 13px;
        }
        
        .dir-item {
            padding: 4px 8px;
            cursor: pointer;
            border-radius: 4px;
        }
        
        .dir-item:hover {
            background: rgba(255,255,255,0.1);
        }
        
        .dir-item.selected {
            background: #f5af19;
        }
        
        .terminal {
            background: #0C0C0C;
            color: #00FF00;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 14px;
            padding: 15px;
            height: 100%;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        
        .terminal-input-line {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .terminal-prompt {
            color: #00FF00;
            font-weight: bold;
        }
        
        .terminal-input {
            background: transparent;
            border: none;
            color: #00FF00;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 14px;
            outline: none;
            flex: 1;
        }
        
        .terminal-output {
            margin-bottom: 10px;
            line-height: 1.5;
        }
        
        .terminal-error {
            color: #FF4444;
        }
        
        .folder-address-bar-container {
            padding: 8px 12px;
            background: rgba(0,0,0,0.3);

        // ========== 窗口缩放和拖拽函数 ==========
        
        function makeResizable(windowDiv) {
            let isResizing = false;
            let currentHandle = null;
            let startX, startY, startWidth, startHeight, startLeft, startTop;
            const minWidth = 200;
            const minHeight = 150;
            
            const handles = windowDiv.querySelectorAll('.resize-handle');
            
            handles.forEach(handle => {
                handle.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    startResize(e.clientX, e.clientY, handle.className.split(' ')[1]);
                });
                
                handle.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    const touch = e.touches[0];
                    startResize(touch.clientX, touch.clientY, handle.className.split(' ')[1]);
                });
            });
            
            function startResize(clientX, clientY, handleType) {
                isResizing = true;
                currentHandle = handleType;
                startX = clientX;
                startY = clientY;
                startWidth = parseInt(windowDiv.style.width);
                startHeight = parseInt(windowDiv.style.height);
                startLeft = parseInt(windowDiv.style.left);
                startTop = parseInt(windowDiv.style.top);
                
                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
                document.addEventListener('touchmove', onTouchMove);
                document.addEventListener('touchend', onTouchEnd);
            }
            
            function onMouseMove(e) {
                if (!isResizing) return;
                resize(e.clientX, e.clientY);
            }
            
            function onTouchMove(e) {
                if (!isResizing) return;
                e.preventDefault();
                const touch = e.touches[0];
                resize(touch.clientX, touch.clientY);
            }
            
            function resize(clientX, clientY) {
                let newWidth = startWidth;
                let newHeight = startHeight;
                let newLeft = startLeft;
                let newTop = startTop;
                
                const dx = clientX - startX;
                const dy = clientY - startY;
                
                switch(currentHandle) {
                    case 'se':
                        newWidth = Math.max(minWidth, startWidth + dx);
                        newHeight = Math.max(minHeight, startHeight + dy);
                        break;
                    case 'sw':
                        newWidth = Math.max(minWidth, startWidth - dx);
                        newHeight = Math.max(minHeight, startHeight + dy);
                        newLeft = startLeft + (startWidth - newWidth);
                        break;
                    case 'ne':
                        newWidth = Math.max(minWidth, startWidth + dx);
                        newHeight = Math.max(minHeight, startHeight - dy);
                        newTop = startTop + (startHeight - newHeight);
                        break;
                    case 'nw':
                        newWidth = Math.max(minWidth, startWidth - dx);
                        newHeight = Math.max(minHeight, startHeight - dy);
                        newLeft = startLeft + (startWidth - newWidth);
                        newTop = startTop + (startHeight - newHeight);
                        break;
                    case 'n':
                        newHeight = Math.max(minHeight, startHeight - dy);
                        newTop = startTop + (startHeight - newHeight);
                        break;
                    case 's':
                        newHeight = Math.max(minHeight, startHeight + dy);
                        break;
                    case 'w':
                        newWidth = Math.max(minWidth, startWidth - dx);
                        newLeft = startLeft + (startWidth - newWidth);
                        break;
                    case 'e':
                        newWidth = Math.max(minWidth, startWidth + dx);
                        break;
                }
                
                windowDiv.style.width = newWidth + 'px';
                windowDiv.style.height = newHeight + 'px';
                windowDiv.style.left = newLeft + 'px';
                windowDiv.style.top = newTop + 'px';
            }
            
            function onMouseUp() {
                isResizing = false;
                currentHandle = null;
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
            }
            
            function onTouchEnd() {
                isResizing = false;
                currentHandle = null;
                document.removeEventListener('touchmove', onTouchMove);
                document.removeEventListener('touchend', onTouchEnd);
            }
        }
        
        function makeWindowDraggable(windowDiv, header) {
            let isDragging = false;
            let startX, startY, originalLeft, originalTop;
            
            const onMouseDown = (e) => {
                if (e.target.closest('.window-controls')) return;
                if (windowDiv.classList.contains('maximized')) return;
                isDragging = true;
                startX = e.clientX;
                startY = e.clientY;
                originalLeft = parseInt(windowDiv.style.left);
                originalTop = parseInt(windowDiv.style.top);
                windowDiv.style.zIndex = nextZIndex++;
                
                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            };
            
            const onTouchStart = (e) => {
                if (e.target.closest('.window-controls')) return;
                if (windowDiv.classList.contains('maximized')) return;
                e.preventDefault();
                isDragging = true;
                const touch = e.touches[0];
                startX = touch.clientX;
                startY = touch.clientY;
                originalLeft = parseInt(windowDiv.style.left);
                originalTop = parseInt(windowDiv.style.top);
                windowDiv.style.zIndex = nextZIndex++;
                
                document.addEventListener('touchmove', onTouchMove);
                document.addEventListener('touchend', onTouchEnd);
            };
            
            const onMouseMove = (e) => {
                if (!isDragging) return;
                let newLeft = originalLeft + (e.clientX - startX);
                let newTop = originalTop + (e.clientY - startY);
                windowDiv.style.left = newLeft + 'px';
                windowDiv.style.top = newTop + 'px';
            };
            
            const onTouchMove = (e) => {
                if (!isDragging) return;
                e.preventDefault();
                const touch = e.touches[0];
                let newLeft = originalLeft + (touch.clientX - startX);
                let newTop = originalTop + (touch.clientY - startY);
                windowDiv.style.left = newLeft + 'px';
                windowDiv.style.top = newTop + 'px';
            };
            
            const onMouseUp = () => {
                isDragging = false;
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
            };
            
            const onTouchEnd = () => {
                isDragging = false;
                document.removeEventListener('touchmove', onTouchMove);
                document.removeEventListener('touchend', onTouchEnd);
            };
            
            header.addEventListener('mousedown', onMouseDown);
            header.addEventListener('touchstart', onTouchStart);
        }

            windowDiv.querySelector('[data-action="maximize"]').onclick = () => {

                    isMaximized = false;

            };
            
            windowDiv.querySelector('[data-action="close"]').onclick = () => {
                windowDiv.remove();
                windows = windows.filter(w => w.element !== windowDiv);
                updateTaskbar();
            };
            
            return windowDiv;
        }
        
        // ========== 终端函数 ==========
        
        function openTerminal() {
            const windowId = Date.now();
            let currentPath = 'C:\\System';
            let commandHistory = [];
            let historyIndex = -1;
            
            const windowDiv = createWindowWithResize({
                title: '终端 - Terminal',
                width: 800,
                height: 500,
                left: 150,
                top: 100,
                content: `<div id="terminal-${windowId}" class="terminal" style="height: 100%; display: flex; flex-direction: column;"></div>`
            });
            
            const contentDiv = windowDiv.querySelector('.window-content');
            contentDiv.style.padding = '0';
            contentDiv.style.height = '100%';
            
            const terminalDiv = document.getElementById(`terminal-${windowId}`);
            
            terminalDiv.innerHTML = `
                <div class="terminal-output">FurryOS Terminal</div>
                <div class="terminal-output">Enter "help" or "?" for help.</div>
                <div class="terminal-output" id="terminal-prompt-${windowId}"></div>
            `;
            
            function addOutput(text, isError = false) {
                const outputDiv = document.createElement('div');
                outputDiv.className = 'terminal-output';
                if (isError) outputDiv.classList.add('terminal-error');
                outputDiv.textContent = text;
                terminalDiv.insertBefore(outputDiv, terminalDiv.lastElementChild);
                terminalDiv.scrollTop = terminalDiv.scrollHeight;
            }
            
            function createInputLine() {
                const promptLine = document.getElementById(`terminal-prompt-${windowId}`);
                promptLine.innerHTML = '';
                promptLine.className = 'terminal-input-line';
                
                const promptSpan = document.createElement('span');
                promptSpan.className = 'terminal-prompt';
                promptSpan.textContent = `${currentPath}> `;
                
                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'terminal-input';
                input.autofocus = true;
                
                promptLine.appendChild(promptSpan);
                promptLine.appendChild(input);
                
                input.focus();
                
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        const command = input.value.trim();
                        if (command) {
                            commandHistory.unshift(command);
                            if (commandHistory.length > 50) commandHistory.pop();
                            historyIndex = -1;
                            executeCommand(command);
                        }
                        createInputLine();
                    } else if (e.key === 'ArrowUp') {
                        e.preventDefault();
                        if (historyIndex < commandHistory.length - 1) {
                            historyIndex++;
                            input.value = commandHistory[historyIndex];
                        }
                    } else if (e.key === 'ArrowDown') {
                        e.preventDefault();
                        if (historyIndex > 0) {
                            historyIndex--;
                            input.value = commandHistory[historyIndex];
                        } else if (historyIndex === 0) {
                            historyIndex = -1;
                            input.value = '';
                        }
                    }
                });
            }
            
            function executeCommand(command) {
                addOutput(`${currentPath}> ${command}`);
                
                const parts = command.split(' ');
                const cmd = parts[0].toLowerCase();
                const args = parts.slice(1);
                
                if (cmd === 'help' || cmd === '?') {
                    addOutput('可用命令:');
                    addOutput('  help, ?        - 显示帮助信息');
                    addOutput('  dir, ls        - 列出当前目录内容');
                    addOutput('  cd <目录>      - 更改当前目录');
                    addOutput('  type <文件>    - 显示文件内容');
                    addOutput('  start <应用>   - 启动应用程序');
                    addOutput('  cls, clear     - 清除屏幕');
                    addOutput('  echo <文本>    - 输出文本');
                    addOutput('  time, date     - 显示当前时间日期');
                    addOutput('  whoami         - 显示当前用户');
                    addOutput('  exit           - 关闭终端');
                    addOutput('');
                    addOutput('可启动的应用:');
                    addOutput('  Browser.frs    - 打开浏览器');
                    addOutput('  Forum.frs      - 打开论坛');
                    addOutput('  Play.frs       - 打开游戏');
                    addOutput('  Share.frs      - 打开分享柜');
                    addOutput('  Explorer.frs   - 打开我的电脑');
                    addOutput('  Terminal.frs   - 打开新终端');
                }
                else if (cmd === 'dir' || cmd === 'ls') {
                    let targetPath = currentPath;
                    if (args[0]) {
                        targetPath = resolvePath(args[0]);
                        if (!targetPath) {
                            addOutput(`系统找不到指定的路径。`, true);
                            return;
                        }
                    }
                    
                    const folder = getItemAtPath(targetPath);
                    if (!folder || folder.type !== 'folder') {
                        addOutput(`系统找不到指定的路径。`, true);
                        return;
                    }
                    
                    addOutput(` 驱动器 ${targetPath.split('\\')[0]} 中的卷没有标签。`);
                    addOutput(` 卷的序列号: ${Math.floor(Math.random() * 1000000000)}`);
                    addOutput('');
                    
                    const children = Object.values(folder.children || {});
                    const folders = children.filter(c => c.type === 'folder');
                    const files = children.filter(c => c.type === 'file' || c.type === 'frs');
                    
                    folders.forEach(f => addOutput(`  <DIR>  ${f.name}`));
                    files.forEach(f => addOutput(`        ${f.name}`));
                    addOutput('');
                    addOutput(`               ${folders.length + files.length} 个文件`);
                }
                else if (cmd === 'cd') {
                    if (!args[0]) {
                        currentPath = 'C:\\';
                        addOutput(`当前目录: ${currentPath}`);
                    } else {
                        const newPath = resolvePath(args[0]);
                        if (!newPath) {
                            addOutput(`系统找不到指定的路径。`, true);
                            return;
                        }
                        const item = getItemAtPath(newPath);
                        if (!item || item.type !== 'folder') {
                            addOutput(`系统找不到指定的路径。`, true);
                            return;
                        }
                        currentPath = newPath;
                    }
                }
                else if (cmd === 'type') {
                    if (!args[0]) {
                        addOutput(`指定文件名。`, true);
                        return;
                    }
                    const filePath = resolvePath(args[0]);
                    if (!filePath) {
                        addOutput(`系统找不到指定的文件。`, true);
                        return;
                    }
                    const file = getItemAtPath(filePath);
                    if (!file || (file.type !== 'file' && file.type !== 'frs')) {
                        addOutput(`系统找不到指定的文件。`, true);
                        return;
                    }
                    if (file.content) {
                        addOutput(file.content);
                    } else if (file.appType) {
                        addOutput(`这是一个应用程序文件 (.frs)。使用 "start ${file.name}" 启动。`);
                    } else {
                        addOutput(`(空文件)`);
                    }
                }
                else if (cmd === 'start') {
                    if (!args[0]) {
                        addOutput(`指定应用程序名称。`, true);
                        return;
                    }
                    const appPath = resolvePath(args[0]);
                    if (!appPath) {
                        addOutput(`系统找不到指定的应用程序。`, true);
                        return;
                    }
                    const app = getItemAtPath(appPath);
                    if (!app || (app.type !== 'frs' && !app.appType)) {
                        addOutput(`不是有效的应用程序。`, true);
                        return;
                    }
                    
                    switch (app.appType) {
                        case 'browser':
                            openBrowser();
                            addOutput(`正在启动浏览器...`);
                            break;
                        case 'forum':
                            openForum();
                            addOutput(`正在启动论坛...`);
                            break;
                        case 'game':
                            openGameMenu();
                            addOutput(`正在启动游戏...`);
                            break;
                        case 'share':
                            openShareCabinet();
                            addOutput(`正在启动分享柜...`);

            function resolvePath(relativePath) {
                if (relativePath.startsWith('C:\\') || relativePath.startsWith('D:\\')) {
                    return getValidPath(relativePath);
                }
                
                let parts = relativePath.split('\\');
                let current = currentPath;
                
                for (const part of parts) {
                    if (part === '..') {
                        const lastSlash = current.lastIndexOf('\\');
                        if (lastSlash > 2) {
                            current = current.substring(0, lastSlash);
                        } else if (lastSlash === 2) {
                            current = current.substring(0, 3);
                        }
                    } else if (part === '.' || part === '') {
                        continue;
                    } else {
                        current = current + '\\' + part;
                    }
                }
                
                return getValidPath(current) ? current : null;
            }
            
            function getValidPath(path) {
                let current = null;
                const parts = path.split('\\');
                const drive = parts[0];
                
                if (drive === 'C:' && virtualFS['C:']) {
                    current = virtualFS['C:'];
                } else if (drive === 'D:' && virtualFS['D:']) {
                    current = virtualFS['D:'];
                } else {
                    return null;
                }
                
                for (let i = 1; i < parts.length; i++) {
                    const part = parts[i];
                    if (!current.children || !current.children[part]) {
                        return null;
                    }
                    current = current.children[part];
                }
                
                return current;
            }
            
            function getItemAtPath(path) {
                let current = null;
                const parts = path.split('\\');
                const drive = parts[0];
                
                if (drive === 'C:' && virtualFS['C:']) {
                    current = virtualFS['C:'];
                } else if (drive === 'D:' && virtualFS['D:']) {
                    current = virtualFS['D:'];

                    }

        function checkAndFixIconOverlap(icons) {
            const iconPositions = [];
            const iconSize = 100;
            
            for (let i = 0; i < icons.length; i++) {
                const icon = icons[i];
                let left = parseInt(icon.style.left);
                let top = parseInt(icon.style.top);
                let overlapped = true;
                let attempts = 0;
                
                while (overlapped && attempts < 50) {
                    overlapped = false;
                    for (let j = 0; j < iconPositions.length; j++) {
                        const pos = iconPositions[j];
                        if (Math.abs(left - pos.left) < iconSize && Math.abs(top - pos.top) < iconSize) {
                            overlapped = true;
                            left += 30;
                            top += 30;
                            if (left + iconSize > window.innerWidth - 50) {
                                left = 20;
                                top += 50;
                            }
                            if (top + iconSize > window.innerHeight - 100) {
                                top = 50;
                                left += 50;
                            }
                            break;
                        }
                    }
                    attempts++;
                }
                
                icon.style.left = left + 'px';
                icon.style.top = top + 'px';
                iconPositions.push({ left, top });
            }
        }
        
        function syncToVirtualFS(name, type, content, virtualPath) {
            let current = virtualFS['D:'];
            const parts = virtualPath.replace('D:\\', '').split('\\');
            
            for (let i = 0; i < parts.length; i++) {
                if (parts[i] && current.children && current.children[parts[i]]) {
                    current = current.children[parts[i]];
                } else if (parts[i]) {
                    if (!current.children) current.children = {};
                    current.children[parts[i]] = {
                        type: 'folder',
                        name: parts[i],
                        path: `D:\\${parts.slice(0, i+1).join('\\')}`,
                        isProtected: parts[i] === 'desktop',
                        children: {}
                    };
                    current = current.children[parts[i]];
                }
            }
            
            if (current.children) {
                current.children[name] = {
                    type: type,
                    name: name,
                    path: `${current.path}\\${name}`,
                    isProtected: false,
                    content: type === 'file' ? content : undefined,
                    children: type === 'folder' ? {} : undefined
                };
            }
        }
        
        async function createNewItem(parentId, name, type, content = '', positionX = null, positionY = null) {
            if (!currentUser) {
                showToast('请先登录');
                return null;
            }
            
            if (type === 'file' && (name.endsWith('.html') || name.endsWith('.htm')) && !content) {
                content = '<!DOCTYPE html>\n<html>\n<head>\n    <meta charset="UTF-8">\n    <title>' + name.replace(/\.html?$/, '') + '</title>\n    <style>\n        body { font-family: Arial, sans-serif; margin: 40px; }\n    </style>\n</head>\n<body>\n    <h1>Hello World!</h1>\n    <p>这是一个新的 HTML 页面。</p>\n</body>\n</html>';
            }
            
            const isDuplicate = await checkDuplicateName(parentId, name, type);
            if (isDuplicate) {
                showToast(`同名${type === 'folder' ? '文件夹' : '文件'}已存在`);
                return null;
            }
            
            const supabase = initSupabase();
            
            const total = await getTotalStorage();
            if (type === 'file' && total + content.length > 51200) {
                showToast('空间不足！最多50KB');
                return null;

            const finalPosY = positionY !== null ? Math.floor(Math.max(10, Math.min(positionY, window.innerHeight - 150))) : Math.floor(Math.random() * 400);
            
            const { data, error } = await supabase
                .from('user_files')
                .insert([{
                    user_id: currentUser.id,
                    name: name,
                    type: type,
                    parent_id: parentId || null,
                    content: content,
                    size: content.length,
                    position_x: finalPosX,
                    position_y: finalPosY
                }])
                .select()
                .single();
            
            if (error) {
                console.error('创建失败:', error);
                showToast('创建失败: ' + error.message);
                return null;
            }
            
            if (parentId === null) {
                syncToVirtualFS(name, type, content, 'D:\\desktop');

                const { data: parentData } = await supabase
                    .from('user_files')
                    .select('name')
                    .eq('id', parentId)
                    .single();
                if (parentData) {
                    syncToVirtualFS(name, type, content, `D:\\desktop\\${parentData.name}`);

            refreshDesktop();
            showToast(`成功创建${type === 'folder' ? '文件夹' : '文件'}: ${name}`);

        async function restoreFromRecycleBin(recycleId, originalId) {

                    .from('recycle_bin')
                    .select('*')
                    .eq('id', recycleId)
                    .single();
                
                if (fetchError || !recycleData) {

                    return;

                const { data: existing, error: checkError } = await supabase
                    .from('user_files')
                    .select('id')
                    .eq('id', originalId)
                    .maybeSingle();
                
                let finalName = recycleData.name;
                
                if (existing) {
                    const timestamp = Date.now();
                    const nameParts = recycleData.name.split('.');
                    if (nameParts.length > 1) {
                        const ext = nameParts.pop();
                        finalName = `${nameParts.join('.')}_恢复_${timestamp}.${ext}`;
                    } else {
                        finalName = `${recycleData.name}_恢复_${timestamp}`;
                    }
                }
                
                const positionX = Math.floor(Math.random() * 500);
                const positionY = Math.floor(Math.random() * 400);
                
                const { error: insertError } = await supabase
                    .from('user_files')
                    .insert([{
                        id: originalId,
                        user_id: currentUser.id,
                        name: finalName,
                        type: recycleData.type,
                        parent_id: recycleData.parent_id,
                        content: recycleData.content,
                        size: recycleData.size || 0,
                        position_x: positionX,
                        position_y: positionY
                    }]);
                
                if (insertError) {
                    console.error('恢复插入失败:', insertError);
                    showToast('恢复失败: ' + insertError.message);
                    return;
                }
                
                await supabase.from('recycle_bin').delete().eq('id', recycleId);
                showToast(`已恢复: ${finalName}`);
                
            } catch (error) {
                console.error('恢复过程出错:', error);
                showToast('恢复失败: ' + error.message);

        }

        // ========== 图标相关函数 ==========
        
        function makeDraggable(element, file) {
            let isDragging = false;
            let startX, startY, originalLeft, originalTop;
            
            const onMouseDown = (e) => {
                if (e.button !== 0) return;
                e.preventDefault();
                e.stopPropagation();
                isDragging = true;
                startX = e.clientX;
                startY = e.clientY;
                originalLeft = parseInt(element.style.left);
                originalTop = parseInt(element.style.top);
                element.classList.add('dragging');
                
                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            };
            
            const onTouchStart = (e) => {
                e.preventDefault();
                e.stopPropagation();
                isDragging = true;
                const touch = e.touches[0];
                startX = touch.clientX;
                startY = touch.clientY;
                originalLeft = parseInt(element.style.left);
                originalTop = parseInt(element.style.top);
                element.classList.add('dragging');
                
                document.addEventListener('touchmove', onTouchMove);
                document.addEventListener('touchend', onTouchEnd);
            };
            
            const onMouseMove = (e) => {
                if (!isDragging) return;
                let newLeft = originalLeft + (e.clientX - startX);
                let newTop = originalTop + (e.clientY - startY);
                
                newLeft = Math.max(0, Math.min(newLeft, window.innerWidth - 100));
                newTop = Math.max(0, Math.min(newTop, window.innerHeight - 150));
                
                element.style.left = newLeft + 'px';
                element.style.top = newTop + 'px';
            };
            
            const onTouchMove = (e) => {
                if (!isDragging) return;
                e.preventDefault();
                const touch = e.touches[0];
                let newLeft = originalLeft + (touch.clientX - startX);
                let newTop = originalTop + (touch.clientY - startY);
                
                newLeft = Math.max(0, Math.min(newLeft, window.innerWidth - 100));
                newTop = Math.max(0, Math.min(newTop, window.innerHeight - 150));
                
                element.style.left = newLeft + 'px';
                element.style.top = newTop + 'px';
            };
            
            const onMouseUp = async () => {
                if (isDragging) {
                    isDragging = false;
                    element.classList.remove('dragging');
                    if (file.id !== 'browser' && file.id !== 'game' && file.id !== 'share-cabinet' && file.id !== 'recycle-bin' && file.id !== 'my-computer' && file.id !== 'forum') {
                        const supabase = initSupabase();
                        await supabase
                            .from('user_files')
                            .update({
                                position_x: Math.floor(parseInt(element.style.left)),
                                position_y: Math.floor(parseInt(element.style.top))
                            })
                            .eq('id', file.id);
                    }
                }
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
            };
            
            const onTouchEnd = () => {
                if (isDragging) {
                    isDragging = false;
                    element.classList.remove('dragging');
                    if (file.id !== 'browser' && file.id !== 'game' && file.id !== 'share-cabinet' && file.id !== 'recycle-bin' && file.id !== 'my-computer' && file.id !== 'forum') {
                        const supabase = initSupabase();
                        supabase
                            .from('user_files')
                            .update({
                                position_x: Math.floor(parseInt(element.style.left)),
                                position_y: Math.floor(parseInt(element.style.top))
                            })
                            .eq('id', file.id);
                    }
                }
                document.removeEventListener('touchmove', onTouchMove);
                document.removeEventListener('touchend', onTouchEnd);
            };
            
            element.addEventListener('mousedown', onMouseDown);
            element.addEventListener('touchstart', onTouchStart);
        }

                if (callCount >= 3) {

                    return false;
                }
                return true;

                if (!await checkRateLimit()) return null;
                
                callCount++;
                messages.push({ role: 'user', content: userMessage });
                
                const supabase = initSupabase();
                const { data: { session } } = await supabase.auth.getSession();
                const accessToken = session?.access_token;
                
                try {
                    const response = await fetch(`${SUPABASE_URL}/functions/v1/furryos-ai`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${accessToken}`,
                            'apikey': SUPABASE_ANON_KEY
                        },
                        body: JSON.stringify({ 
                            messages: messages.slice(-10),
                            userId: currentUser?.id || 'anonymous'
                        })
                    });
                    
                    if (response.status === 429) {
                        showToast('调用过于频繁，请稍后再试');
                        messages.pop();
                        return null;
                    }
                    
                    const data = await response.json();
                    
                    if (data.error) {
                        showToast('AI错误: ' + data.error);
                        messages.pop();
                        return null;
                    }
                    
                    messages.push({ role: 'assistant', content: data.content });
                    
                    if (data.action) {
                        executeAIAction(data.action);
                    }
                    
                    return data.content;
                } catch (error) {

                    messages.pop();

                    return null;

                    if (e.target.closest('.ai-chat-controls')) return;
                    isDragging = true;
                    dragStartX = e.clientX;
                    dragStartY = e.clientY;
                    startLeft = windowDiv.offsetLeft;
                    startTop = windowDiv.offsetTop;
                    windowDiv.style.position = 'fixed';
                    windowDiv.style.right = 'auto';
                    document.addEventListener('mousemove', onMouseMove);
                    document.addEventListener('mouseup', onMouseUp);
                });
                
                function onMouseMove(e) {
                    if (!isDragging) return;
                    let newLeft = startLeft + (e.clientX - dragStartX);
                    let newTop = startTop + (e.clientY - dragStartY);
                    newLeft = Math.max(0, Math.min(newLeft, window.innerWidth - windowDiv.offsetWidth));
                    newTop = Math.max(0, Math.min(newTop, window.innerHeight - 50));
                    windowDiv.style.left = newLeft + 'px';
                    windowDiv.style.top = newTop + 'px';
                }
                
                function onMouseUp() {
                    isDragging = false;
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('mouseup', onMouseUp);
                }
                
                windowDiv.querySelector('[data-action="minimize"]').onclick = () => {
                    windowDiv.classList.add('minimized');

        async function getFolderPath(folderId) {
            if (!folderId) return '桌面';
            
            const supabase = initSupabase();
            const pathParts = [];
            let currentId = folderId;
            
            while (currentId) {
                const { data, error } = await supabase
                    .from('user_files')
                    .select('id, name, parent_id')
                    .eq('id', currentId)
                    .single();
                
                if (error || !data) break;
                
                pathParts.unshift(data.name);
                currentId = data.parent_id;
            }
            
            if (pathParts.length === 0) return '桌面';
            return `D:\\desktop\\${pathParts.join('\\')}`;
        }
        
        async function navigateToPath(targetPath, windowDiv) {
            const supabase = initSupabase();
            
            let normalizedPath = targetPath;
            if (normalizedPath.startsWith('D:\\desktop\\')) {
                normalizedPath = normalizedPath.substring('D:\\desktop\\'.length);
            } else if (normalizedPath === '桌面' || normalizedPath === 'D:\\desktop') {
                normalizedPath = '';
            } else if (normalizedPath.startsWith('D:\\')) {
                normalizedPath = normalizedPath.substring('D:\\'.length);
            }
            
            try {
                let currentParentId = null;
                let currentFolder = null;
                
                if (normalizedPath === '') {
                    windowDiv.remove();
                    await loadUserFiles();
                    return;
                }
                
                const parts = normalizedPath.split('\\');
                let found = true;
                
                for (let i = 0; i < parts.length; i++) {
                    const part = parts[i];
                    const query = supabase
                        .from('user_files')
                        .select('id, name, type')
                        .eq('user_id', currentUser.id)
                        .eq('name', part)
                        .eq('type', 'folder');
                    
                    if (currentParentId === null) {
                        query.is('parent_id', null);
                    } else {
                        query.eq('parent_id', currentParentId);
                    }
                    
                    const { data, error } = await query;
                    
                    if (error || !data || data.length === 0) {
                        found = false;
                        break;
                    }
                    
                    currentParentId = data[0].id;
                    currentFolder = data[0];
                }
                
                if (found && currentFolder) {
                    windowDiv.remove();
                    openFolderWindow(currentFolder, targetPath);
                } else {
                    showToast('无效的目录路径');
                }
            } catch (error) {
                console.error('导航失败:', error);
                showToast('导航失败: ' + error.message);
            }
        }

        async function openNotepad(file) {
            const windowId = Date.now();
            const windowDiv = createWindowWithResize({
                title: `📝 ${file.name}`,
                width: 600,
                height: 500,
                left: 150,
                top: 150,
                content: `<textarea class="notepad-textarea" id="notepad-${windowId}" style="width:100%; height:100%; background:rgba(0,0,0,0.5); color:white; border:1px solid rgba(255,255,255,0.2); border-radius:8px; padding:10px; font-family:monospace; resize:none;">${escapeHtml(file.content || '')}</textarea>`
            });
            
            let isModified = false;
            const supabase = initSupabase();
            const { data: latestFile, error: fetchError } = await supabase
                .from('user_files')
                .select('content, size')
                .eq('id', file.id)
                .maybeSingle();
            
            let currentContent = latestFile?.content || '';
            const textarea = document.getElementById(`notepad-${windowId}`);
            textarea.value = currentContent;
            textarea.oninput = () => { isModified = true; };
            
            const controls = windowDiv.querySelector('.window-controls');
            const saveBtn = document.createElement('div');
            saveBtn.className = 'window-control';
            saveBtn.textContent = '💾';
            saveBtn.onclick = async () => {
                const newContent = textarea.value;
                const total = await getTotalStorage();
                const oldSize = latestFile?.size || 0;
                const newSize = newContent.length;
                
                if (total - oldSize + newSize > 51200) {
                    showToast('空间不足！无法保存');
                    return;
                }
                
                const { error } = await supabase
                    .from('user_files')
                    .update({ content: newContent, size: newSize })
                    .eq('id', file.id);
                
                if (error) {
                    showToast('保存失败: ' + error.message);
                    return;
                }
                
                file.content = newContent;
                file.size = newSize;
                currentContent = newContent;
                isModified = false;
                showToast('已保存');
            };
            controls.insertBefore(saveBtn, controls.firstChild);
            
            const closeBtn = windowDiv.querySelector('[data-action="close"]');
            closeBtn.onclick = async () => {
                if (isModified && textarea.value !== currentContent) {
                    const save = confirm('文件已修改，是否保存？');
                    if (save) {
                        const newContent = textarea.value;
                        const total = await getTotalStorage();
                        const oldSize = latestFile?.size || 0;
                        const newSize = newContent.length;
                        
                        if (total - oldSize + newSize <= 51200) {
                            const { error } = await supabase
                                .from('user_files')
                                .update({ content: newContent, size: newSize })
                                .eq('id', file.id);
                            if (!error) showToast('已保存');
                        }
                    }
                }
                windowDiv.remove();
                windows = windows.filter(w => w.element !== windowDiv);
                updateTaskbar();
            };
            
            windows.push({ id: windowId, element: windowDiv, title: file.name, minimized: false });
            updateTaskbar();
        }

                    } },
                    { label: '粘贴', icon: '📋', action: () => pasteItem(targetType === 'folder-empty' ? targetItem?.folderId : null, targetItem?.window), disabled: !clipboardItem },

                ];
            } else if (targetType === 'file' || targetType === 'folder') {
                const isHtml = targetType === 'file' && targetItem && (targetItem.name.endsWith('.html') || targetItem.name.endsWith('.htm'));
                
                menuItems = [
                    { label: '打开', icon: targetType === 'folder' ? '📂' : '✏️', action: () => openItem(targetItem) }
                ];

                        action: () => openHtmlInBrowser(targetItem) 
                    });
                }
                
                menuItems.push(
                    { label: '复制', icon: '📋', action: () => copyItem(targetItem) },
                    { label: '剪切', icon: '✂️', action: () => cutItem(targetItem) },
                    { label: '重命名', icon: '✏️', action: () => renameItem(targetItem, windowRef) },
                    { label: '删除', icon: '🗑️', action: () => deleteItem(targetItem, windowRef), danger: true }
                );
            } else if (targetType === 'browser') {
                menuItems = [
                    { label: '打开', icon: '🌐', action: () => openBrowser() }
                ];
            } else if (targetType === 'game') {
                menuItems = [
                    { label: '打开游戏中心', icon: '🎮', action: () => openGameMenu() }
                ];
            } else if (targetType === 'share-cabinet') {
                menuItems = [
                    { label: '打开分享柜', icon: '📬', action: () => openShareCabinet() }
                ];
            } else if (targetType === 'forum') {
                menuItems = [
                    { label: '打开论坛', icon: '💬', action: () => openForum() }
                ];
            } else if (targetType === 'recycle-bin') {
                menuItems = [
                    { label: '打开回收站', icon: '🗑️', action: () => openRecycleBin() }
                ];
            } else if (targetType === 'my-computer') {
                menuItems = [
                    { label: '打开', icon: '🖥️', action: () => openMyComputer() }
                ];
            }
            
            menu.innerHTML = menuItems.map(item => `
                <div class="menu-item ${item.danger ? 'danger' : ''} ${item.hasSubmenu ? 'has-submenu' : ''} ${item.disabled ? 'disabled' : ''}" data-action="${item.label}">
                    <span class="menu-icon">${item.icon}</span>
                    <span class="menu-label">${item.label}</span>
                    ${item.hasSubmenu ? '<span class="submenu-arrow">▶</span>' : ''}
                </div>
            `).join('');
            
            if (targetType === 'desktop' || targetType === 'folder-empty') {
                const newMenuItem = menu.querySelector('[data-action="新建"]');
                if (newMenuItem) {
                    newMenuItem.addEventListener('mouseenter', () => {
                        const existingSubmenu = newMenuItem.querySelector('.context-submenu');
                        if (existingSubmenu) existingSubmenu.remove();
                        showNewSubmenu(newMenuItem, targetType, targetItem, windowRef, mouseX, mouseY);
                    });
                    
                    newMenuItem.addEventListener('mouseleave', () => {
                        setTimeout(() => {
                            const submenu = newMenuItem.querySelector('.context-submenu');
                            if (submenu && !submenu.matches(':hover')) {
                                submenu.remove();
                            }
                        }, 100);
                    });
                }
            }
            
            let x = e.clientX;
            let y = e.clientY;
            
            setTimeout(() => {
                const menuRect = menu.getBoundingClientRect();
                if (x + menuRect.width > window.innerWidth) {
                    x = window.innerWidth - menuRect.width - 10;
                }
                if (y + menuRect.height > window.innerHeight) {
                    y = window.innerHeight - menuRect.height - 10;
                }
                if (x < 0) x = 10;
                if (y < 0) y = 10;
                menu.style.left = x + 'px';
                menu.style.top = y + 'px';
            }, 0);
            
            document.body.appendChild(menu);

                    const menuItem = menuItems.find(m => m.label === label);
                    if (menuItem && menuItem.action) {
                        menuItem.action();
                    }
                    if (currentContextMenu) {
                        currentContextMenu.remove();
                        currentContextMenu = null;
                    }
                };
            });
            
            setTimeout(() => {
                const closeMenu = (e) => {
                    if (currentContextMenu && !currentContextMenu.contains(e.target)) {
                        currentContextMenu.remove();
                        currentContextMenu = null;
                        document.removeEventListener('click', closeMenu);
                        document.removeEventListener('contextmenu', closeMenu);
                    }
                };
                document.addEventListener('click', closeMenu);
                document.addEventListener('contextmenu', closeMenu);
            }, 100);
        }
        
        async function renameItem(item, windowRef) {
            const newName = prompt('请输入新名称', item.name);
            if (!newName || newName === item.name) return;
            
            const isDuplicate = await checkDuplicateName(item.parent_id, newName, item.type);
            if (isDuplicate) {
                showToast('同名文件已存在');
                return;
            }
            
            const supabase = initSupabase();
            const { error } = await supabase
                .from('user_files')
                .update({ name: newName })
                .eq('id', item.id);
            
            if (error) {
                showToast('重命名失败: ' + error.message);
                return;
            }
            
            await loadUserFiles();
            if (windowRef) {
                windowRef.remove();
                if (item.type === 'folder') {
                    openFolderWindow(item);
                }
            }
            showToast('重命名成功');
        }
        
        async function deleteItem(item, windowRef) {

            await moveToRecycleBin(item);
            
            if (windowRef) windowRef.remove();
            showToast(`已移到回收站: ${item.name}`);
        }

        async function navigateVirtualPath(drive, targetPath, windowDiv) {
            let normalizedPath = targetPath;
            if (normalizedPath.startsWith('D:\\')) {
                normalizedPath = normalizedPath.substring(3);
            } else if (normalizedPath.startsWith('C:\\')) {
                normalizedPath = normalizedPath.substring(3);
            }
            
            const parts = normalizedPath.split('\\');
            let current = virtualFS[drive];
            
            for (let i = 0; i < parts.length; i++) {
                const part = parts[i];
                if (part && current.children && current.children[part]) {
                    current = current.children[part];
                } else if (part) {
                    showToast('目录不存在: ' + targetPath);
                    return;
                }
            }
            
            if (current && current.type === 'folder') {
                windowDiv.remove();
                openVirtualFolder(drive, current.name);
            } else {
                showToast('目标不是文件夹');
            }
        }
