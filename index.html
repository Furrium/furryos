            function showDirectoryBrowser(callback) {
                const browserWindowId = Date.now();
                const browserWindow = createWindowWithResize({
                    title: '浏览目录',
                    width: 400,
                    height: 500,
                    left: 250,
                    top: 150,
                    content: `<div id="dir-browser-${browserWindowId}" style="padding: 10px;"></div>`
                });
                
                const dirContentDiv = browserWindow.querySelector('.window-content');
                dirContentDiv.style.padding = '0';
                
                function renderDirectoryTree(currentPath, container) {
                    const parts = currentPath.replace('D:\\', '').split('\\');
                    let current = virtualFS['D:'];
                    
                    for (let i = 0; i < parts.length; i++) {
                        if (parts[i] && current.children && current.children[parts[i]]) {
                            current = current.children[parts[i]];
                        }
                    }
                    
                    const treeDiv = document.createElement('div');
                    treeDiv.className = 'dir-tree';
                    
                    function addToTree(obj, indent, path) {
                        Object.values(obj.children || {}).forEach(item => {
                            if (item.type === 'folder') {
                                const itemDiv = document.createElement('div');
                                itemDiv.style.paddingLeft = indent + 'px';
                                itemDiv.style.margin = '2px 0';
                                itemDiv.innerHTML = `<span class="dir-item" data-path="${path}\\${item.name}">📁 ${escapeHtml(item.name)}</span>`;
                                itemDiv.querySelector('.dir-item').onclick = () => {
                                    document.querySelectorAll('.dir-item').forEach(el => el.classList.remove('selected'));
                                    itemDiv.querySelector('.dir-item').classList.add('selected');
                                    callback(`${path}\\${item.name}`);
                                    browserWindow.remove();
                                };
                                treeDiv.appendChild(itemDiv);
                                addToTree(item, indent + 20, `${path}\\${item.name}`);
                            }
                        });
                    }
                    
                    addToTree(current, 0, currentPath);
                    
                    if (treeDiv.children.length === 0) {
                        treeDiv.innerHTML = '<div style="padding: 20px; text-align: center; color: rgba(255,255,255,0.6);">此文件夹为空</div>';
                    }
                    
                    container.innerHTML = '';
                    container.appendChild(treeDiv);
                }
                
                renderDirectoryTree('D:\\desktop', document.getElementById(`dir-browser-${browserWindowId}`));
                
                windows.push({ id: browserWindowId, element: browserWindow, title: '浏览目录', minimized: false });
                updateTaskbar();
            }

                }
                
                const reader = new FileReader();

                    const content = event.target.result;
                    const filename = file.name;
                    const code = generatePickupCode();
                    
                    const supabase = initSupabase();
                    const { data, error } = await supabase
                        .from('file_shares')
                        .insert([{
                            code: code,
                            filename: filename,
                            content: content,
                            size: content.length,
                            owner_id: currentUser.id,
                            file_type: isHtml ? 'html' : 'txt',
                            expires_at: null
                        }])
                        .select()
                        .single();

            downloadBtn.onclick = async () => {

                const supabase = initSupabase();

                    showToast('发布成功！');
                    document.getElementById(`forum-title-${windowId}`).value = '';
                    document.getElementById(`forum-content-${windowId}`).value = '';
                    switchTab('posts');
                }
            };
            
            async function loadPosts(windowId) {
                const supabase = initSupabase();
                const { data, error } = await supabase
                    .from('forum_posts')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                const panel = document.getElementById(`forum-posts-panel-${windowId}`);
                if (error || !data || data.length === 0) {
                    panel.innerHTML = '<div style="text-align: center; padding: 40px;">暂无帖子，快来发布第一个吧！</div>';
                    return;
                }
                
                const categoryNames = {
                    'general': '💬 一般讨论',
                    'help': '❓ 求助问答',
                    'share': '📁 资源分享',
                    'announcement': '📢 公告通知'
                };
                
                panel.innerHTML = data.map(post => `
                    <div class="forum-post-item" data-post-id="${post.id}" style="background: rgba(255,255,255,0.05); border-radius: 8px; padding: 15px; margin-bottom: 10px; cursor: pointer; transition: background 0.2s;">
                        <div style="display: flex; justify-content: space-between; align-items: start;">
                            <div style="flex: 1;">
                                <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 8px;">
                                    <span style="background: rgba(245,175,25,0.2); padding: 2px 8px; border-radius: 4px; font-size: 11px;">${categoryNames[post.category] || '💬 一般讨论'}</span>
                                    <span style="font-size: 12px; color: rgba(255,255,255,0.5);">👤 ${escapeHtml(getUsernameFromEmail(post.author_email))}</span>
                                    <span style="font-size: 12px; color: rgba(255,255,255,0.4);">📅 ${new Date(post.created_at).toLocaleString()}</span>
                                </div>
                                <div style="font-size: 16px; font-weight: bold; margin-bottom: 8px;">${escapeHtml(post.title)}</div>
                                <div style="font-size: 13px; color: rgba(255,255,255,0.7); overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;">${escapeHtml(post.content.substring(0, 150))}${post.content.length > 150 ? '...' : ''}</div>
                                <div style="display: flex; gap: 15px; margin-top: 10px; font-size: 12px; color: rgba(255,255,255,0.4);">
                                    <span>👁️ ${post.views || 0} 阅读</span>
                                    <span>💬 ${post.replies || 0} 回复</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
                
                panel.querySelectorAll('.forum-post-item').forEach(item => {
                    item.onclick = () => {
                        const postId = item.dataset.postId;
                        openPostDetail(postId, windowId);
                    };
                });
            }
            
            async function loadMyPosts(windowId) {
                const supabase = initSupabase();
                const { data, error } = await supabase
                    .from('forum_posts')
                    .select('*')
                    .eq('author_id', currentUser.id)
                    .order('created_at', { ascending: false });
                
                const panel = document.getElementById(`forum-my-panel-${windowId}`);
                if (error || !data || data.length === 0) {
                    panel.innerHTML = '<div style="text-align: center; padding: 40px;">你还没有发布过帖子</div>';
                    return;
                }
                
                const categoryNames = {
                    'general': '💬 一般讨论',
                    'help': '❓ 求助问答',
                    'share': '📁 资源分享',
                    'announcement': '📢 公告通知'
                };
                
                panel.innerHTML = data.map(post => `
                    <div class="forum-post-item" data-post-id="${post.id}" style="background: rgba(255,255,255,0.05); border-radius: 8px; padding: 15px; margin-bottom: 10px; cursor: pointer;">
                        <div style="display: flex; justify-content: space-between; align-items: start;">
                            <div style="flex: 1;">
                                <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 8px;">
                                    <span style="background: rgba(245,175,25,0.2); padding: 2px 8px; border-radius: 4px; font-size: 11px;">${categoryNames[post.category]}</span>
                                    <span style="font-size: 12px; color: rgba(255,255,255,0.4);">📅 ${new Date(post.created_at).toLocaleString()}</span>
                                </div>
                                <div style="font-size: 16px; font-weight: bold; margin-bottom: 8px;">${escapeHtml(post.title)}</div>
                                <div style="font-size: 13px; color: rgba(255,255,255,0.7);">${escapeHtml(post.content.substring(0, 100))}${post.content.length > 100 ? '...' : ''}</div>
                                <div style="display: flex; gap: 15px; margin-top: 10px; font-size: 12px; color: rgba(255,255,255,0.4);">
                                    <span>👁️ ${post.views || 0} 阅读</span>
                                    <span>💬 ${post.replies || 0} 回复</span>
                                </div>
                            </div>
                            <div style="display: flex; gap: 5px;">
                                <button class="delete-post-btn" data-post-id="${post.id}" style="background: rgba(220,53,69,0.8); border: none; border-radius: 4px; color: white; padding: 4px 8px; cursor: pointer;">删除</button>
                            </div>
                        </div>
                    </div>
                `).join('');
                
                panel.querySelectorAll('.delete-post-btn').forEach(btn => {
                    btn.onclick = async (e) => {
                        e.stopPropagation();
                        if (confirm('确定删除此帖子吗？所有回复也会被删除。')) {
                            const supabase = initSupabase();
                            await supabase.from('forum_replies').delete().eq('post_id', btn.dataset.postId);
                            await supabase.from('forum_posts').delete().eq('id', btn.dataset.postId);
                            showToast('已删除');
                            loadMyPosts(windowId);
                            if (postsPanel.style.display !== 'none') loadPosts(windowId);
                        }
                    };
                });
                
                panel.querySelectorAll('.forum-post-item').forEach(item => {
                    item.onclick = (e) => {
                        if (!e.target.closest('.delete-post-btn')) {
                            openPostDetail(item.dataset.postId, windowId);
                        }
                    };
                });
            }
            
            async function openPostDetail(postId, parentWindowId) {
                const supabase = initSupabase();
                
                const { data: postData } = await supabase
                    .from('forum_posts')
                    .select('views')
                    .eq('id', postId)
                    .single();
                
                await supabase
                    .from('forum_posts')
                    .update({ views: (postData?.views || 0) + 1 })
                    .eq('id', postId);
                
                const { data: post, error } = await supabase
                    .from('forum_posts')
                    .select('*')
                    .eq('id', postId)
                    .single();
                
                if (error || !post) {
                    showToast('帖子不存在');
                    return;
                }
                
                const { data: replies } = await supabase
                    .from('forum_replies')
                    .select('*')
                    .eq('post_id', postId)
                    .order('created_at', { ascending: true });
                
                const detailWindowId = Date.now();
                const detailWindow = createWindowWithResize({
                    title: `📄 ${post.title.substring(0, 30)}`,
                    width: 800,
                    height: 600,
                    left: 200,
                    top: 80,
                    content: `
                        <div style="display: flex; flex-direction: column; height: 100%;">
                            <div style="padding: 15px; background: rgba(0,0,0,0.3); border-radius: 8px; margin-bottom: 15px;">
                                <div style="font-size: 20px; font-weight: bold; margin-bottom: 10px;">${escapeHtml(post.title)}</div>
                                <div style="display: flex; gap: 15px; font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 15px;">
                                    <span>👤 ${escapeHtml(getUsernameFromEmail(post.author_email))}</span>
                                    <span>📅 ${new Date(post.created_at).toLocaleString()}</span>
                                    <span>👁️ ${post.views || 0} 阅读</span>
                                </div>
                                <div style="line-height: 1.6; white-space: pre-wrap;">${escapeHtml(post.content)}</div>
                            </div>
                            
                            <div style="margin-bottom: 10px; font-size: 14px; font-weight: bold;">💬 回复 (${replies?.length || 0})</div>
                            <div id="replies-list-${detailWindowId}" style="flex: 1; overflow-y: auto; margin-bottom: 15px;">
                                ${replies && replies.length > 0 ? replies.map(reply => `
                                    <div style="background: rgba(255,255,255,0.05); border-radius: 8px; padding: 12px; margin-bottom: 10px;">
                                        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                                            <span style="font-size: 12px; color: rgba(255,255,255,0.6);">👤 ${escapeHtml(getUsernameFromEmail(reply.author_email))}</span>
                                            <span style="font-size: 11px; color: rgba(255,255,255,0.4);">${new Date(reply.created_at).toLocaleString()}</span>
                                        </div>
                                        <div style="font-size: 13px; line-height: 1.5;">${escapeHtml(reply.content)}</div>
                                    </div>
                                `).join('') : '<div style="text-align: center; color: rgba(255,255,255,0.5); padding: 20px;">暂无回复，来抢沙发吧！</div>'}
                            </div>
                            
                            <div>
                                <textarea id="reply-content-${detailWindowId}" placeholder="写下你的回复..." style="width: 100%; height: 80px; padding: 10px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: white; outline: none; resize: vertical;"></textarea>
                                <button id="reply-submit-${detailWindowId}" style="margin-top: 10px; padding: 8px 16px; background: #f5af19; border: none; border-radius: 6px; color: white; cursor: pointer;">回复</button>
                            </div>
                        </div>
                    `
                });
                
                const detailContentDiv = detailWindow.querySelector('.window-content');
                detailContentDiv.style.padding = '10px';
                detailContentDiv.style.display = 'flex';
                detailContentDiv.style.flexDirection = 'column';
                
                const replySubmit = document.getElementById(`reply-submit-${detailWindowId}`);
                replySubmit.onclick = async () => {
                    const content = document.getElementById(`reply-content-${detailWindowId}`).value.trim();
                    if (!content) {
                        showToast('请输入回复内容');
                        return;
                    }
                    
                    const { error } = await supabase
                        .from('forum_replies')
                        .insert([{
                            post_id: postId,
                            content: content,
                            author_id: currentUser.id,
                            author_email: currentUser.email
                        }]);
                    
                    if (error) {
                        showToast('回复失败: ' + error.message);
                    } else {
                        await supabase
                            .from('forum_posts')
                            .update({ replies: (replies?.length || 0) + 1, last_reply_at: new Date() })
                            .eq('id', postId);
                        showToast('回复成功');
                        detailWindow.remove();
                        openPostDetail(postId, parentWindowId);
                        if (document.getElementById(`forum-posts-panel-${parentWindowId}`)) {
                            loadPosts(parentWindowId);
                        }
                    }
                };
                
                windows.push({ id: detailWindowId, element: detailWindow, title: post.title.substring(0, 20), minimized: false });
                updateTaskbar();
            }
            
            await loadPosts(windowId);
            
            windows.push({ id: windowId, element: windowDiv, title: '论坛', minimized: false });
            updateTaskbar();
        }
        
        // ========== 用户认证 ==========
        
        async function changePassword(newPassword) {
            const supabase = initSupabase();
            const { error } = await supabase.auth.updateUser({
                password: newPassword
            });
            
            if (error) {
                showToast('修改失败: ' + error.message);
                return false;
            }
            showToast('密码修改成功！');
            return true;
        }
        
        // ========== 开始菜单 ==========
        
        function showStartMenu() {
            if (startMenuOpen) {
                const existing = document.getElementById('start-menu-popup');
                if (existing) existing.remove();
                startMenuOpen = false;
                return;
            }
            
            const existing = document.getElementById('start-menu-popup');
            if (existing) existing.remove();
            
            const menu = document.createElement('div');
            menu.id = 'start-menu-popup';
            menu.className = 'start-menu-popup';
            menu.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <strong>${escapeHtml(getUsernameFromEmail(currentUser?.email))}</strong>
                    <span id="change-password-btn" style="cursor: pointer; font-size: 12px; background: #f5af19; padding: 2px 8px; border-radius: 4px;">修改密码</span>
                </div>
                <div class="change-password-form" id="change-password-form" style="display: none;">
                    <input type="password" id="new-password" placeholder="新密码">
                    <input type="password" id="confirm-password" placeholder="确认新密码">
                    <button id="submit-password-change">确认修改</button>
                </div>
                <hr>
                <div id="start-menu-storage">📊 存储空间: 0KB / 50KB</div>
                <div id="start-menu-logout">🚪 退出登录</div>
            `;
            
            document.body.appendChild(menu);
            startMenuOpen = true;
            
            getTotalStorage().then(total => {
                const storageEl = document.getElementById('start-menu-storage');
                if (storageEl) {
                    storageEl.textContent = `📊 存储空间: ${Math.round(total/1024)}KB / 50KB`;
                }
            });
            
            const changePwdBtn = document.getElementById('change-password-btn');
            const changePwdForm = document.getElementById('change-password-form');
            
            changePwdBtn.onclick = () => {
                if (changePwdForm.style.display === 'none') {
                    changePwdForm.style.display = 'block';
                } else {
                    changePwdForm.style.display = 'none';
                }
            };
            
            const submitBtn = document.getElementById('submit-password-change');
            submitBtn.onclick = async () => {
                const newPwd = document.getElementById('new-password').value;
                const confirmPwd = document.getElementById('confirm-password').value;
                
                if (newPwd !== confirmPwd) {
                    showToast('两次输入的新密码不一致');
                    return;
                }
                if (newPwd.length < 6) {
                    showToast('新密码至少需要6位');
                    return;
                }
                
                await changePassword(newPwd);
                changePwdForm.style.display = 'none';
                document.getElementById('new-password').value = '';
                document.getElementById('confirm-password').value = '';
            };
            
            document.getElementById('start-menu-logout').onclick = () => {
                logout();
                menu.remove();
                startMenuOpen = false;
            };
            
            setTimeout(() => {
                const closeMenu = (e) => {
                    if (!menu.contains(e.target)) {
                        menu.remove();
                        startMenuOpen = false;
                        document.removeEventListener('click', closeMenu);
                    }
                };
                document.addEventListener('click', closeMenu);
            }, 100);
        }
        
        async function logout() {
            const supabase = initSupabase();
            await supabase.auth.signOut();
            currentUser = null;
            currentFiles = [];
            windows = [];
            renderWelcomePage();
        }
        
        // ========== 桌面设置 ==========
        
        function setupDesktopContext() {
            const desktop = document.getElementById('desktop');
            const iconsContainer = document.getElementById('desktop-icons');
            
            if (!desktop) return;
            
            const handleContextMenu = (e) => {
                if (e.target === desktop || e.target === iconsContainer || e.target.classList.contains('desktop-icons')) {
                    e.preventDefault();
                    showContextMenu(e, 'desktop');
                }
            };
            
            desktop.oncontextmenu = handleContextMenu;
            if (iconsContainer) {
                iconsContainer.oncontextmenu = handleContextMenu;
            }
        }
        
        // ========== 页面渲染 ==========
        
        function renderDesktop() {
            document.getElementById('app').innerHTML = `
                <div class="desktop" id="desktop">
                    <div class="desktop-icons" id="desktop-icons"></div>
                    <div class="taskbar">
                        <div class="start-menu" id="start-menu">📟 FurryOS</div>
                        <div class="taskbar-windows" id="taskbar-windows"></div>
                        <div class="datetime" id="datetime"></div>
                    </div>
                </div>
            `;
            
            setupDesktopContext();
            document.getElementById('start-menu').onclick = showStartMenu;
            updateDateTime();
            setInterval(updateDateTime, 1000);
            cleanExpiredRecycleBin();
            loadUserFiles();
            
            // 创建 AI 悬浮窗
            setTimeout(() => {
                createAIFloatingWidget();
            }, 500);
        }
        
        function renderWelcomePage() {
            document.getElementById('app').innerHTML = `
                <div class="welcome-container">
                    <div class="welcome-box">
                        <div class="welcome-title">FurryOS</div>
                        <div class="welcome-subtitle">一个轻量级网页版操作系统</div>
                        <div class="auth-tabs">
                            <button class="auth-tab active" data-tab="login">登录</button>
                            <button class="auth-tab" data-tab="register">注册</button>
                        </div>
                        <div id="login-form" class="auth-form active">
                            <input type="email" id="login-email" class="auth-input" placeholder="邮箱" autocomplete="off">
                            <input type="password" id="login-password" class="auth-input" placeholder="密码">
                            <button id="login-btn" class="auth-btn">登录</button>
                            <div id="login-error" class="error-msg"></div>
                        </div>
                        <div id="register-form" class="auth-form">
                            <input type="email" id="reg-email" class="auth-input" placeholder="邮箱" autocomplete="off">
                            <input type="password" id="reg-password" class="auth-input" placeholder="密码（至少6位）">
                            <button id="register-btn" class="auth-btn">注册</button>
                            <div id="reg-error" class="error-msg"></div>
                        </div>
                    </div>
                </div>
            `;
            
            document.querySelectorAll('.auth-tab').forEach(tab => {
                tab.onclick = () => {
                    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    document.querySelectorAll('.auth-form').forEach(form => form.classList.remove('active'));
                    document.getElementById(`${tab.dataset.tab}-form`).classList.add('active');
                };
            });
            
            document.getElementById('login-btn').onclick = async () => {
                const email = document.getElementById('login-email').value;
                const password = document.getElementById('login-password').value;
                const supabase = initSupabase();
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) {
                    document.getElementById('login-error').textContent = error.message;
                } else {
                    currentUser = data.user;
                    renderDesktop();
                }
            };
            
            document.getElementById('register-btn').onclick = async () => {
                const email = document.getElementById('reg-email').value;
                const password = document.getElementById('reg-password').value;
                if (password.length < 6) {
                    document.getElementById('reg-error').textContent = '密码至少需要6位';
                    return;
                }
                const supabase = initSupabase();
                const { data, error } = await supabase.auth.signUp({ 
                    email, 
                    password,
                    options: { emailRedirectTo: window.location.origin }
                });
                if (error) {
                    document.getElementById('reg-error').textContent = error.message;
                } else {
                    showToast('注册成功！请登录');
                    document.querySelector('[data-tab="login"]').click();
                }
            };
        }
        
        async function checkAuth() {
            const supabase = initSupabase();
            if (!supabase) {
                setTimeout(checkAuth, 100);
                return;
            }
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                currentUser = session.user;
                renderDesktop();
            } else {
                renderWelcomePage();
            }
        }
        
        checkAuth();
    </script>
</body>
</html>
